<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — TinyBotics</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #080C14;
      --bg2:      #0D1220;
      --bg3:      #111827;
      --accent:   #00E5FF;
      --accent2:  #7C3AED;
      --accent3:  #F59E0B;
      --green:    #10B981;
      --red:      #EF4444;
      --text:     #F0F4FF;
      --muted:    #8892A4;
      --border:   rgba(255,255,255,0.07);
      --card:     rgba(255,255,255,0.03);
      --font-d:   'Syne', sans-serif;
      --font-b:   'DM Sans', sans-serif;
      --radius:   14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }

    /* ── LOGIN PAGE ── */
    #login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .login-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }
    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 24px 24px 0 0;
    }
    .login-logo {
      font-family: var(--font-d);
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }
    .login-logo span { color: var(--accent); }
    .login-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
    }
    .login-label {
      font-family: var(--font-d);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }
    .login-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 20px;
    }
    .login-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: var(--font-d);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 4px;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    .topbar {
      background: rgba(8,12,20,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      font-family: var(--font-d);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .topbar-logo span { color: var(--accent); }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .admin-badge {
      padding: 4px 12px;
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }
    .logout-btn {
      padding: 8px 18px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 50px;
      color: #fca5a5;
      font-family: var(--font-d);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.15); }

    .dash-body {
      padding: 32px;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { border-color: rgba(0,229,255,0.12); transform: translateY(-2px); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.cyan::before  { background: var(--accent); }
    .stat-card.purple::before { background: var(--accent2); }
    .stat-card.gold::before  { background: var(--accent3); }
    .stat-card.green::before { background: var(--green); }
    .stat-icon { font-size: 28px; margin-bottom: 12px; }
    .stat-val {
      font-family: var(--font-d);
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card.cyan   .stat-val { color: var(--accent); }
    .stat-card.purple .stat-val { color: #a78bfa; }
    .stat-card.gold   .stat-val { color: var(--accent3); }
    .stat-card.green  .stat-val { color: var(--green); }
    .stat-label { font-size: 13px; color: var(--muted); }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      width: fit-content;
    }
    .tab-btn {
      padding: 8px 22px;
      border-radius: 50px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-d);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    /* TABLE */
    .table-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .table-title {
      font-family: var(--font-d);
      font-size: 16px;
      font-weight: 700;
    }
    .table-search {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 13px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
    }
    .table-search:focus { border-color: var(--accent); }
    .table-search::placeholder { color: var(--muted); }
    .refresh-btn {
      padding: 8px 16px;
      background: rgba(0,229,255,0.07);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 8px;
      color: var(--accent);
      font-family: var(--font-d);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: rgba(0,229,255,0.12); }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table th {
      padding: 12px 20px;
      text-align: left;
      font-family: var(--font-d);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-mobile  { background: rgba(0,229,255,0.1);  color: var(--accent);  border: 1px solid rgba(0,229,255,0.2); }
    .badge-desktop { background: rgba(124,58,237,0.1); color: #a78bfa;         border: 1px solid rgba(124,58,237,0.2); }
    .badge-tablet  { background: rgba(245,158,11,0.1); color: var(--accent3); border: 1px solid rgba(245,158,11,0.2); }
    .badge-android { background: rgba(16,185,129,0.1); color: var(--green);   border: 1px solid rgba(16,185,129,0.2); }
    .badge-ios     { background: rgba(239,68,68,0.1);  color: #fca5a5;         border: 1px solid rgba(239,68,68,0.2); }
    .badge-windows { background: rgba(0,229,255,0.07); color: var(--accent);   border: 1px solid rgba(0,229,255,0.1); }
    .badge-other   { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty-state div { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .loading-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .table-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .dash-body { padding: 16px; }
      .topbar { padding: 0 16px; }
      .data-table th:nth-child(n+4),
      .data-table td:nth-child(n+4) { display: none; }
      .login-card { padding: 32px 24px; margin: 16px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════
     LOGIN PAGE
══════════════════════ -->
<div id="login-page">
  <div class="login-orb" style="width:500px;height:500px;background:rgba(0,229,255,0.06);top:-100px;right:-100px;"></div>
  <div class="login-orb" style="width:400px;height:400px;background:rgba(124,58,237,0.08);bottom:-100px;left:-100px;"></div>

  <div class="login-card">
    <div class="login-logo">tiny<span>botics</span></div>
    <p class="login-subtitle">🔐 Admin Dashboard — Authorised Access Only</p>

    <div class="login-error" id="loginError"></div>

    <label class="login-label">Email</label>
    <input class="login-input" type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"/>

    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Login to Dashboard</button>
  </div>
</div>


<!-- ══════════════════════
     DASHBOARD
══════════════════════ -->
<div id="dashboard">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">tiny<span>botics</span> <span style="color:var(--muted);font-weight:400;font-size:14px;">/ admin</span></div>
    <div class="topbar-right">
      <span class="admin-badge">● Live</span>
      <span id="adminEmail" style="font-size:13px;color:var(--muted);"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="dash-body">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card cyan">
        <div class="stat-icon">👁️</div>
        <div class="stat-val" id="totalVisitors">—</div>
        <div class="stat-label">Total Visitors</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon">📱</div>
        <div class="stat-val" id="mobileCount">—</div>
        <div class="stat-label">Mobile Visitors</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-icon">🌍</div>
        <div class="stat-val" id="countryCount">—</div>
        <div class="stat-label">Countries</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">📄</div>
        <div class="stat-val" id="pageCount">—</div>
        <div class="stat-label">Pages Tracked</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('visitors', this)">👁️ Visitors</button>
      <button class="tab-btn" onclick="switchTab('pages', this)">📄 Pages</button>
      <button class="tab-btn" onclick="switchTab('devices', this)">📱 Devices</button>
    </div>

    <!-- VISITORS TAB -->
    <div id="tab-visitors">
      <div class="table-card">
        <div class="table-header">
          <span class="table-title">Recent Visitors</span>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <input class="table-search" type="text" id="visitorSearch" placeholder="Search IP, city, browser..." oninput="filterVisitors()"/>
            <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
          </div>
        </div>
        <div id="visitorsTableWrap">
          <div class="loading-state">Loading visitor data...</div>
        </div>
        <div class="table-footer">
          <span id="visitorCount">0 records</span>
          <span style="color:var(--muted);font-size:11px;">Auto-refreshes every 30s</span>
        </div>
      </div>
    </div>

    <!-- PAGES TAB -->
    <div id="tab-pages" style="display:none;">
      <div class="table-card">
        <div class="table-header">
          <span class="table-title">Page Visit Breakdown</span>
        </div>
        <div id="pagesTableWrap">
          <div class="loading-state">Loading...</div>
        </div>
      </div>
    </div>

    <!-- DEVICES TAB -->
    <div id="tab-devices" style="display:none;">
      <div class="table-card">
        <div class="table-header">
          <span class="table-title">Device & Browser Breakdown</span>
        </div>
        <div id="devicesTableWrap">
          <div class="loading-state">Loading...</div>
        </div>
      </div>
    </div>

  </div>
</div>


<!-- ══════════════════════
     FIREBASE SCRIPT
══════════════════════ -->
<script type="module">
  import { initializeApp }                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue }                 from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAisU7STb4UAJmcpuFtvp520OrX0of-THI",
    authDomain:        "anonymousconfession-19707.firebaseapp.com",
    databaseURL:       "https://anonymousconfession-19707-default-rtdb.firebaseio.com",
    projectId:         "anonymousconfession-19707",
    storageBucket:     "anonymousconfession-19707.firebasestorage.app",
    messagingSenderId: "513711142017",
    appId:             "1:513711142017:web:a54387faff58ba03644980"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  let allVisitors = [];

  // ── AUTH STATE ──
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('login-page').style.display  = 'none';
      document.getElementById('dashboard').style.display   = 'block';
      document.getElementById('adminEmail').textContent    = user.email;
      loadData();
      setInterval(loadData, 30000);
    } else {
      document.getElementById('login-page').style.display  = 'flex';
      document.getElementById('dashboard').style.display   = 'none';
    }
  });

  // ── LOGIN ──
  window.doLogin = async () => {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');

    errEl.classList.remove('show');
    btn.disabled   = true;
    btn.textContent = 'Logging in...';

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      let msg = 'Login failed. Check your email and password.';
      if (err.code === 'auth/user-not-found')    msg = 'No account found with this email.';
      if (err.code === 'auth/wrong-password')    msg = 'Incorrect password. Try again.';
      if (err.code === 'auth/invalid-email')     msg = 'Invalid email address.';
      if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
      errEl.textContent = msg;
      errEl.classList.add('show');
      btn.disabled    = false;
      btn.textContent = 'Login to Dashboard';
    }
  };

  // ── LOGOUT ──
  window.doLogout = () => signOut(auth);

  // ── LOAD DATA ──
  window.loadData = () => {
    onValue(ref(db, 'tinybotics_visitors'), (snap) => {
      const raw = snap.val();
      if (!raw) { allVisitors = []; renderAll(); return; }
      allVisitors = Object.entries(raw)
        .map(([id, v]) => ({ id, ...v }))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      renderAll();
    }, { onlyOnce: true });
  };

  function renderAll() {
    renderStats();
    renderVisitors(allVisitors);
    renderPages();
    renderDevices();
  }

  // ── STATS ──
  function renderStats() {
    const total    = allVisitors.length;
    const mobile   = allVisitors.filter(v => v.device === 'Mobile').length;
    const countries = new Set(allVisitors.map(v => v.country).filter(Boolean)).size;
    const pages    = new Set(allVisitors.map(v => v.page).filter(Boolean)).size;
    document.getElementById('totalVisitors').textContent = total;
    document.getElementById('mobileCount').textContent  = mobile;
    document.getElementById('countryCount').textContent = countries || '—';
    document.getElementById('pageCount').textContent    = pages;
  }

  // ── VISITORS TABLE ──
  window.filterVisitors = () => {
    const q = document.getElementById('visitorSearch').value.toLowerCase();
    const filtered = allVisitors.filter(v =>
      (v.ip       || '').toLowerCase().includes(q) ||
      (v.city     || '').toLowerCase().includes(q) ||
      (v.country  || '').toLowerCase().includes(q) ||
      (v.browser  || '').toLowerCase().includes(q) ||
      (v.os       || '').toLowerCase().includes(q) ||
      (v.page     || '').toLowerCase().includes(q)
    );
    renderVisitors(filtered);
  };

  function renderVisitors(list) {
    const wrap = document.getElementById('visitorsTableWrap');
    document.getElementById('visitorCount').textContent = `${list.length} records`;

    if (!list.length) {
      wrap.innerHTML = `<div class="empty-state"><div>👁️</div><p>No visitor data yet. Share your website to start tracking!</p></div>`;
      return;
    }

    const rows = list.map(v => {
      const deviceBadge = v.device === 'Mobile'  ? 'badge-mobile'
                        : v.device === 'Tablet'  ? 'badge-tablet'
                        : 'badge-desktop';
      const osBadge     = (v.os || '').includes('Android') ? 'badge-android'
                        : (v.os || '').includes('iOS')     ? 'badge-ios'
                        : (v.os || '').includes('Windows') ? 'badge-windows'
                        : 'badge-other';
      const time = v.timeIST || (v.timestamp ? new Date(v.timestamp).toLocaleString('en-IN') : '—');
      const page = (v.page || '/').replace('.html','') || '/';
      const loc  = [v.city, v.country].filter(Boolean).join(', ') || '—';

      return `<tr>
        <td style="font-family:monospace;font-size:12px;color:var(--muted);">${v.ip || '—'}</td>
        <td><span class="badge ${deviceBadge}">${v.device || '—'}</span></td>
        <td>${v.browser || '—'}</td>
        <td><span class="badge ${osBadge}">${v.os || '—'}</span></td>
        <td style="color:var(--accent);font-size:12px;">${page}</td>
        <td>${loc}</td>
        <td style="color:var(--muted);font-size:12px;white-space:nowrap;">${time}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr>
            <th>IP Address</th><th>Device</th><th>Browser</th>
            <th>OS</th><th>Page</th><th>Location</th><th>Time (IST)</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── PAGES TABLE ──
  function renderPages() {
    const wrap = document.getElementById('pagesTableWrap');
    if (!allVisitors.length) {
      wrap.innerHTML = `<div class="empty-state"><div>📄</div><p>No data yet.</p></div>`;
      return;
    }
    const counts = {};
    allVisitors.forEach(v => {
      const p = (v.page || '/').replace('.html','') || '/';
      counts[p] = (counts[p] || 0) + 1;
    });
    const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
    const max    = sorted[0]?.[1] || 1;

    const rows = sorted.map(([page, count]) => {
      const pct = Math.round((count / allVisitors.length) * 100);
      const bar = Math.round((count / max) * 100);
      return `<tr>
        <td style="color:var(--accent);font-weight:600;">${page}</td>
        <td style="font-family:var(--font-d);font-weight:700;color:var(--text);">${count}</td>
        <td style="width:200px;">
          <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden;">
            <div style="width:${bar}%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;"></div>
          </div>
        </td>
        <td style="color:var(--muted);font-size:13px;">${pct}%</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th>Page</th><th>Visits</th><th>Share</th><th>%</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── DEVICES TABLE ──
  function renderDevices() {
    const wrap = document.getElementById('devicesTableWrap');
    if (!allVisitors.length) {
      wrap.innerHTML = `<div class="empty-state"><div>📱</div><p>No data yet.</p></div>`;
      return;
    }

    const devices  = {};
    const browsers = {};
    const oss      = {};

    allVisitors.forEach(v => {
      const d = v.device  || 'Unknown';
      const b = v.browser || 'Unknown';
      const o = v.os      || 'Unknown';
      devices[d]  = (devices[d]  || 0) + 1;
      browsers[b] = (browsers[b] || 0) + 1;
      oss[o]      = (oss[o]      || 0) + 1;
    });

    const makeRows = (obj) => Object.entries(obj)
      .sort((a,b) => b[1]-a[1])
      .map(([k, v]) => {
        const pct = Math.round((v / allVisitors.length) * 100);
        return `<tr>
          <td style="font-weight:500;">${k}</td>
          <td style="font-family:var(--font-d);font-weight:700;">${v}</td>
          <td style="color:var(--muted);">${pct}%</td>
        </tr>`;
      }).join('');

    wrap.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:0;">
        <div style="padding:0 0 0 0;">
          <div style="padding:14px 20px;font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);">Device Type</div>
          <table class="data-table"><thead><tr><th>Device</th><th>Count</th><th>%</th></tr></thead><tbody>${makeRows(devices)}</tbody></table>
        </div>
        <div style="border-left:1px solid var(--border);">
          <div style="padding:14px 20px;font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);">Browser</div>
          <table class="data-table"><thead><tr><th>Browser</th><th>Count</th><th>%</th></tr></thead><tbody>${makeRows(browsers)}</tbody></table>
        </div>
        <div style="border-left:1px solid var(--border);">
          <div style="padding:14px 20px;font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);">Operating System</div>
          <table class="data-table"><thead><tr><th>OS</th><th>Count</th><th>%</th></tr></thead><tbody>${makeRows(oss)}</tbody></table>
        </div>
      </div>`;
  }

  // ── TAB SWITCH ──
  window.switchTab = (tab, btn) => {
    ['visitors','pages','devices'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
    });
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };

  // ── LOGIN ON ENTER ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') {
      window.doLogin();
    }
  });
</script>
</body>
</html>
