<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — TinyBotics</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">Tiny<span>Botics</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="orders.html" class="active">My Orders</a></li>
    </ul>
    <div class="nav-auth" id="nav-auth">
      <a href="login.html" class="btn-outline">Login</a>
    </div>
    <div class="nav-user" id="nav-user" style="display:none">
      <span class="user-greeting" id="user-greeting"></span>
      <div class="avatar-wrap">
        <div class="avatar" id="nav-avatar" onclick="toggleMenu()"></div>
        <div class="avatar-dropdown" id="avatar-dropdown">
          <a href="orders.html">📦 My Orders</a>
          <button onclick="doLogout()">🚪 Logout</button>
        </div>
      </div>
    </div>
    <button class="hamburger" onclick="toggleNav()">☰</button>
  </div>
</nav>

<section class="inner-page">
  <div class="container">
    <div class="page-hero">
      <p class="section-tag">Account</p>
      <h1>My Orders</h1>
      <p class="page-sub">Track and view all your TinyBot orders below.</p>
    </div>

    <div id="orders-wrap">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading your orders...</p>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="justify-content:center">
      <p>© 2025 TinyBotics · Made with ❤️ in India</p>
    </div>
  </div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPeJZRj48zLkgLziX-AaB--edSS_GfoOU",
  authDomain: "anonymousconfession-19707.firebaseapp.com",
  projectId: "anonymousconfession-19707",
  storageBucket: "anonymousconfession-19707.firebasestorage.app",
  messagingSenderId: "513711142017",
  appId: "1:513711142017:web:319791913b52aa5b644980"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const STATUS_MAP = {
  pending:   { label: '⏳ Pending',   cls: 'status-pending' },
  confirmed: { label: '✅ Confirmed', cls: 'status-confirmed' },
  shipped:   { label: '🚚 Shipped',   cls: 'status-shipped' },
  delivered: { label: '📦 Delivered', cls: 'status-delivered' },
};

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    document.getElementById('orders-wrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔐</div>
        <h3>Please Login First</h3>
        <p>You need to be logged in to view your orders.</p>
        <a href="login.html" class="btn-primary" style="display:inline-block;margin-top:20px">Login Now</a>
      </div>`;
    return;
  }

  // Nav
  document.getElementById('nav-auth').style.display = 'none';
  document.getElementById('nav-user').style.display = 'flex';
  const name = user.displayName || user.email.split('@')[0];
  document.getElementById('user-greeting').textContent = 'Hi, ' + name.split(' ')[0];
  document.getElementById('nav-avatar').textContent = name.charAt(0).toUpperCase();

  // Load orders
  try {
    const q = query(collection(db, 'orders'), where('userId', '==', user.uid));
    const snap = await getDocs(q);
    if (snap.empty) {
      document.getElementById('orders-wrap').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <h3>No orders yet!</h3>
          <p>You haven't ordered anything. Get your TinyBot today!</p>
          <a href="index.html" class="btn-primary" style="display:inline-block;margin-top:20px">Shop Now</a>
        </div>`;
      return;
    }

    const orders = [];
    snap.forEach(d => orders.push({ id: d.id, ...d.data() }));
    orders.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));

    let html = '<div class="orders-list">';
    orders.forEach(o => {
      const s = STATUS_MAP[o.status] || STATUS_MAP.pending;
      const date = o.createdAt ? new Date(o.createdAt.toMillis()).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }) : 'N/A';
      html += `
        <div class="order-card">
          <div class="order-card-top">
            <div>
              <div class="order-id">Order #${o.id.slice(0,8).toUpperCase()}</div>
              <div class="order-date">${date}</div>
            </div>
            <span class="status-badge ${s.cls}">${s.label}</span>
          </div>
          <div class="order-product-row">
            <div class="order-product-icon">🤖</div>
            <div>
              <div class="order-product-name">${o.product || 'TinyBot Pro'}</div>
              <div class="order-product-price">₹${(o.price || 2500).toLocaleString('en-IN')}</div>
            </div>
          </div>
          ${o.trackingLink
            ? `<div class="order-tracking"><span class="track-label">📍 Tracking</span><a href="${o.trackingLink}" target="_blank" class="track-link">Track your package →</a></div>`
            : `<div class="order-tracking"><span class="track-label" style="color:var(--muted)">Tracking link will appear after your order is confirmed.</span></div>`
          }
        </div>`;
    });
    html += '</div>';
    document.getElementById('orders-wrap').innerHTML = html;
  } catch(e) {
    document.getElementById('orders-wrap').innerHTML = '<p style="color:var(--red);text-align:center;padding:40px">Failed to load orders. Please refresh.</p>';
  }
});

window.doLogout = async () => { await signOut(auth); window.location.href = 'login.html'; };
window.toggleMenu = () => document.getElementById('avatar-dropdown').classList.toggle('open');
document.addEventListener('click', e => { if (!e.target.closest('.avatar-wrap')) document.getElementById('avatar-dropdown')?.classList.remove('open'); });
</script>
<script>
function toggleNav() { document.getElementById('nav-links').classList.toggle('open'); }
</script>
</body>
</html>
