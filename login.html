<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TinyBotics</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">Tiny<span>Botics</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-auth">
      <a href="login.html" class="btn-primary">Login</a>
    </div>
    <button class="hamburger" onclick="toggleNav()">☰</button>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-orb auth-orb1"></div>
  <div class="auth-orb auth-orb2"></div>
  <div class="auth-card">
    <!-- LOGIN VIEW -->
    <div id="view-login">
      <div class="auth-logo">🤖</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Login to your TinyBotics account</p>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-error" id="login-err"></div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">Login to Account</button>
      <p class="auth-switch">Don't have an account? <a onclick="switchView('signup')">Sign up free</a></p>
    </div>

    <!-- SIGNUP VIEW -->
    <div id="view-signup" style="display:none">
      <div class="auth-logo">✨</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Join TinyBotics and order your robot</p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your Full Name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-pass" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')doSignup()">
      </div>
      <div class="form-error" id="signup-err"></div>
      <button class="auth-btn" id="signup-btn" onclick="doSignup()">Create Account</button>
      <p class="auth-switch">Already have an account? <a onclick="switchView('login')">Login</a></p>
    </div>
  </div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPeJZRj48zLkgLziX-AaB--edSS_GfoOU",
  authDomain: "anonymousconfession-19707.firebaseapp.com",
  projectId: "anonymousconfession-19707",
  storageBucket: "anonymousconfession-19707.firebasestorage.app",
  messagingSenderId: "513711142017",
  appId: "1:513711142017:web:319791913b52aa5b644980"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// If already logged in, redirect
onAuthStateChanged(auth, user => {
  if (user) window.location.href = 'index.html';
});

// Check if signup hash
if (window.location.hash === '#signup') switchView('signup');

window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Please fill all fields.'; return; }
  btn.textContent = 'Logging in...'; btn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = 'index.html';
  } catch(e) {
    err.textContent = e.code === 'auth/invalid-credential' ? 'Wrong email or password.' : 'Login failed. Try again.';
    btn.textContent = 'Login to Account'; btn.disabled = false;
  }
};

window.doSignup = async function() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const err = document.getElementById('signup-err');
  const btn = document.getElementById('signup-btn');
  err.textContent = '';
  if (!name || !email || !pass) { err.textContent = 'Please fill all fields.'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }
  btn.textContent = 'Creating account...'; btn.disabled = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    window.location.href = 'index.html';
  } catch(e) {
    err.textContent = e.code === 'auth/email-already-in-use' ? 'Email already registered. Try login.' : 'Signup failed. Try again.';
    btn.textContent = 'Create Account'; btn.disabled = false;
  }
};
</script>

<script>
function switchView(v) {
  document.getElementById('view-login').style.display = v === 'login' ? 'block' : 'none';
  document.getElementById('view-signup').style.display = v === 'signup' ? 'block' : 'none';
}
function toggleNav() {
  document.getElementById('nav-links').classList.toggle('open');
}
window.switchView = switchView;
</script>
</body>
</html>
